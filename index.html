<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>PagoYa</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <span>PagoYa</span>
  </header>

  <main>

    <div class="cards">
      <div class="card">
        <h3>Cuenta</h3>
        <p>Gestiona tus cuentas.</p>
        <a href="pages/account/list.html">Ver cuentas</a>
      </div>
      <div class="card">
        <h3>Transferencia</h3>
        <p>Realiza transferencias.</p>
        <a href="pages/transfer/list.html">Ver transferencias</a>
      </div>
    </div>

    <form>
      <h2>Iniciar sesion</h2>

      <label for="email">Correo:</label>
      <input type="email" id="email" placeholder="tu@correo.com" required>

      <label for="password">Contrasena:</label>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit">Entrar</button>
    </form>

  </main>

  <footer>
    <p>© 2026 PagoYa</p>
  </footer>

</body>

</html>
